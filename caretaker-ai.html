<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Caretaker AI — Property OS</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#2BB8A3;--teal-d:#1A9E8A;--teal-dk:#0D7A6A;--teal-l:#4DD4C0;--teal-pale:#E6F7F5;
  --gold:#F0A520;--gold-d:#D4870A;--gold-pale:#FEF3C7;
  --sb:#0D3D36;--sb-mid:#134E45;--sb-border:rgba(255,255,255,0.08);
  --cr:#F4FAF9;--su:#FFFFFF;--bd:#E0ECEB;--bds:#C4DAD8;
  --tp:#0D1F1C;--ts:#476B66;--tm:#8FADA9;
  --red:#DC2626;--rp:#FEF2F2;--bl:#2563EB;--bp:#EFF6FF;
  --gn:#059669;--gp:#ECFDF5;--pu:#7C3AED;--pp:#F5F3FF;
  --r:10px;--rs:7px;--font:'Outfit',sans-serif;
  --shadow:0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
html,body,#root{height:100%;font-family:var(--font);}
body{background:var(--cr);color:var(--tp);-webkit-font-smoothing:antialiased;}
/* ─── SHELL ─── */
.shell{display:flex;height:100vh;overflow:hidden;}
/* ─── SIDEBAR ─── */
.sidebar{width:244px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:0;}
.sb-logo{padding:18px 18px 16px;border-bottom:var(--sb-border) 1px solid;display:flex;align-items:center;min-height:76px;}
.sb-logo img{height:40px;width:auto;object-fit:contain;display:block;}
.prop-sw{margin:12px 12px 6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:9px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .12s;}
.prop-sw:hover{background:rgba(255,255,255,0.09);}
.prop-n{font-size:13px;color:#fff;font-weight:600;}
.prop-c{font-size:11px;color:rgba(255,255,255,0.38);margin-top:2px;}
.nav-sec{padding:10px 0 2px;}
.nav-lbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:0 18px;margin-bottom:4px;}
.nav-it{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;margin:1px 8px;border-radius:7px;font-size:13.5px;color:rgba(255,255,255,0.56);font-weight:500;position:relative;transition:all .12s;user-select:none;}
.nav-it:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88);}
.nav-it.active{background:rgba(240,165,32,.14);color:#fff;font-weight:600;}
.nav-it.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--gold);border-radius:0 3px 3px 0;margin-left:-8px;}
.nav-ic{font-size:14px;width:17px;text-align:center;flex-shrink:0;}
.nav-bd{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.nav-bd.gold{background:var(--gold);}
.sb-ft{margin-top:auto;border-top:var(--sb-border) 1px solid;padding:12px;}
.uc{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .12s;}
.uc:hover{background:rgba(255,255,255,0.07);}
.u-nm{font-size:13px;color:#fff;font-weight:600;}
.u-rl{font-size:11px;color:rgba(255,255,255,0.36);}
/* ─── TOPBAR ─── */
.topbar{height:56px;background:var(--su);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
.pg-ttl{font-size:15px;font-weight:700;color:var(--tp);letter-spacing:-.01em;}
.srch{display:flex;align-items:center;gap:8px;background:var(--cr);border:1.5px solid var(--bd);border-radius:8px;padding:6px 13px;margin-left:auto;width:260px;transition:border-color .15s;}
.srch:focus-within{border-color:var(--teal);}
.srch input{border:none;outline:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--tp);flex:1;}
.srch input::placeholder{color:var(--tm);}
.srch-k{background:var(--bd);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--tm);font-family:monospace;}
.tb-acts{display:flex;align-items:center;gap:6px;margin-left:10px;}
.ib{width:34px;height:34px;border-radius:7px;background:transparent;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ts);position:relative;transition:all .12s;}
.ib:hover{background:var(--cr);border-color:var(--bds);}
.nd{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid #fff;}
.tb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold-l,#F5BC4A),var(--teal));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;margin-left:4px;border:2px solid var(--bd);}
/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.content{flex:1;overflow-y:auto;padding:22px 24px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--bds);border-radius:10px;}
/* ─── CARDS ─── */
.card{background:var(--su);border:1px solid var(--bd);border-radius:var(--r);}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.card-ttl{font-size:13.5px;font-weight:700;color:var(--tp);}
.card-bd{padding:18px;}
/* ─── METRICS ─── */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.mc{background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.mc:hover{box-shadow:var(--shadow);border-color:var(--bds);}
.mc-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:10px;}
.ml{font-size:11px;color:var(--ts);font-weight:600;letter-spacing:.01em;margin-bottom:6px;text-transform:uppercase;}
.mv{font-size:26px;font-weight:800;color:var(--tp);letter-spacing:-.03em;line-height:1;margin-bottom:5px;}
.mdl{font-size:12px;font-weight:500;}
.up{color:var(--gn);}.dn{color:var(--red);}
/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.bd-dot{width:5px;height:5px;border-radius:50%;}
.b-open{background:#FEF3C7;color:#92400E;}.b-open .bd-dot{background:var(--gold);}
.b-in-progress{background:var(--bp);color:#1D4ED8;}.b-in-progress .bd-dot{background:var(--bl);}
.b-done{background:var(--gp);color:#065F46;}.b-done .bd-dot{background:var(--gn);}
.b-critical{background:var(--rp);color:var(--red);}.b-critical .bd-dot{background:var(--red);}
.b-paid{background:var(--gp);color:#065F46;}.b-paid .bd-dot{background:var(--gn);}
.b-overdue{background:var(--rp);color:var(--red);}.b-overdue .bd-dot{background:var(--red);}
.b-pending{background:#F3F4F6;color:#374151;}.b-pending .bd-dot{background:#9CA3AF;}
.b-high{background:#FEF3C7;color:#92400E;}.b-high .bd-dot{background:var(--gold);}
.b-medium{background:#F3F4F6;color:#374151;}.b-medium .bd-dot{background:#9CA3AF;}
.b-low{background:var(--gp);color:#065F46;}.b-low .bd-dot{background:var(--gn);}
.b-available{background:var(--gp);color:#065F46;}.b-available .bd-dot{background:var(--gn);}
.b-busy{background:var(--bp);color:#1D4ED8;}.b-busy .bd-dot{background:var(--bl);}
.b-inactive{background:#F3F4F6;color:#6B7280;}.b-inactive .bd-dot{background:#9CA3AF;}
.b-sent{background:var(--gp);color:#065F46;}.b-sent .bd-dot{background:var(--gn);}
.b-scheduled{background:var(--pp);color:var(--pu);}.b-scheduled .bd-dot{background:var(--pu);}
.b-draft{background:#F3F4F6;color:#374151;}.b-draft .bd-dot{background:#9CA3AF;}
/* ─── TABLE ─── */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tm);padding:10px 16px;border-bottom:1px solid var(--bd);white-space:nowrap;}
td{padding:11px 16px;font-size:13px;color:var(--tp);border-bottom:1px solid var(--bd);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.clickable{cursor:pointer;}
tr.clickable:hover td{background:var(--teal-pale);}
.pt{color:var(--ts);font-size:12.5px;}
.pn{font-weight:600;}
/* ─── ACTIVITY ─── */
.act-it{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);}
.act-it:last-child{border-bottom:none;}
.act-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;flex-shrink:0;}
.act-tx{font-size:12.5px;color:var(--tp);line-height:1.45;}
.act-tm{font-size:11px;color:var(--tm);margin-top:2px;}
/* ─── PROGRESS ─── */
.pt-trk{background:var(--bd);border-radius:10px;overflow:hidden;}
.pt-fl{height:100%;border-radius:10px;background:var(--teal);}
.pt-fl.am{background:var(--gold);}
.pt-fl.gn{background:var(--gn);}
.pt-fl.rd{background:var(--red);}
/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .12s;user-select:none;line-height:1;}
.btn:active{transform:scale(.98);}
.b-pri{background:var(--teal-d);color:#fff;}.b-pri:hover{background:var(--teal-dk);}
.b-amb{background:var(--gold);color:#fff;}.b-amb:hover{background:var(--gold-d);}
.b-grn{background:var(--gn);color:#fff;}.b-grn:hover{background:#047857;}
.b-red{background:var(--red);color:#fff;}.b-red:hover{background:#b91c1c;}
.b-tl{background:var(--teal-pale);color:var(--teal-d);border:1.5px solid rgba(43,184,163,.25);}.b-tl:hover{background:#d0f0ec;}
.b-out{background:transparent;color:var(--tp);border:1.5px solid var(--bd);}.b-out:hover{background:var(--cr);border-color:var(--bds);}
.b-gh{background:transparent;color:var(--ts);padding:6px 10px;}.b-gh:hover{background:var(--cr);color:var(--tp);}
.b-sm{padding:5px 11px;font-size:12px;}
.b-xs{padding:3px 9px;font-size:11px;border-radius:5px;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
/* ─── BARS ─── */
.bar-c{display:flex;align-items:flex-end;gap:3px;}
.bar{flex:1;border-radius:3px 3px 0 0;transition:opacity .15s;}
.bar:hover{opacity:.75;}
.bg{background:var(--teal);}.ba{background:var(--gold);}
/* ─── SECTION HEADER ─── */
.sc-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.sc-ttl{font-size:19px;font-weight:800;color:var(--tp);letter-spacing:-.02em;}
.sc-sb{font-size:12.5px;color:var(--tm);margin-top:3px;font-weight:500;}
/* ─── FILTERS ─── */
.fr-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.fi-wrap{display:flex;align-items:center;gap:7px;background:var(--su);border:1.5px solid var(--bd);border-radius:8px;padding:6px 12px;flex:1;max-width:280px;transition:border-color .15s;}
.fi-wrap:focus-within{border-color:var(--teal);}
.fi-wrap input{border:none;outline:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--tp);flex:1;}
.fi-wrap input::placeholder{color:var(--tm);}
.fs{background:var(--su);border:1.5px solid var(--bd);border-radius:8px;padding:7px 11px;font-size:12.5px;color:var(--tp);font-family:var(--font);cursor:pointer;outline:none;transition:border-color .15s;}
.fs:focus{border-color:var(--teal);}
/* ─── DONUT ─── */
.dn-v{width:68px;height:68px;border-radius:50%;background:conic-gradient(var(--teal) 0% 89%,var(--bd) 89% 100%);flex-shrink:0;position:relative;}
.dn-h{position:absolute;top:11px;left:11px;right:11px;bottom:11px;background:var(--su);border-radius:50%;}
.lg-i{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:5px;}
.lg-d{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* ─── TABS ─── */
.tabs{display:flex;gap:2px;background:var(--cr);border:1.5px solid var(--bd);border-radius:8px;padding:3px;}
.tab{padding:5px 14px;font-size:12.5px;border-radius:6px;cursor:pointer;font-weight:500;color:var(--ts);transition:all .12s;user-select:none;}
.tab.a{background:var(--su);color:var(--tp);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}
/* ─── UNIT GRID ─── */
.ut-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;}
.ut{border:1.5px solid var(--bd);border-radius:8px;padding:11px;cursor:pointer;transition:all .12s;}
.ut:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(43,184,163,.12);}
.ut.oc{border-left:3px solid var(--teal);}
.ut.vc{border-left:3px solid var(--tm);}
.ut.od{border-left:3px solid var(--bd);}
.u-num{font-size:13.5px;font-weight:700;margin-bottom:3px;}
.u-tn{font-size:11px;color:var(--ts);}
.u-rt{font-size:11px;font-weight:600;margin-top:3px;}
/* ─── PROFILE HERO ─── */
.ph{background:linear-gradient(135deg,var(--sb) 0%,var(--teal-dk) 100%);border-radius:var(--r) var(--r) 0 0;padding:24px 22px;display:flex;align-items:center;gap:16px;}
.pa{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#FDE68A);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--sb);border:3px solid rgba(255,255,255,.25);flex-shrink:0;}
.pn2{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.02em;}
.pu2{font-size:12.5px;color:rgba(255,255,255,.65);margin-top:3px;}
.ptg{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.85);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
/* ─── INSIGHTS ─── */
.ins-c{background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;}
.ins-i{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ins-t{font-size:13.5px;font-weight:700;margin-bottom:3px;}
.ins-d{font-size:12px;color:var(--ts);line-height:1.5;}
/* ─── WA ─── */
.wa-layout{display:grid;grid-template-columns:290px 1fr;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;background:var(--su);box-shadow:var(--shadow);}
.wa-list{border-right:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column;}
.wa-list::-webkit-scrollbar{width:4px;}
.wa-list::-webkit-scrollbar-thumb{background:var(--bds);border-radius:10px;}
.wa-list-hd{padding:13px 16px;border-bottom:1px solid var(--bd);font-size:13.5px;font-weight:700;flex-shrink:0;}
.wa-thread{display:flex;align-items:center;gap:9px;padding:11px 15px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;flex-shrink:0;}
.wa-thread:hover{background:var(--cr);}
.wa-thread.sel{background:var(--teal-pale);}
.wa-thread-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.wa-thread-preview{font-size:11.5px;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:175px;}
.wa-unread{background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto;flex-shrink:0;}
.wa-chat{display:flex;flex-direction:column;}
.wa-chat-hd{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.wa-messages{flex:1;overflow-y:auto;padding:16px;background:#EDF6F5;display:flex;flex-direction:column;gap:7px;}
.wa-messages::-webkit-scrollbar{width:4px;}
.wa-messages::-webkit-scrollbar-thumb{background:var(--bds);border-radius:10px;}
.wa-out{background:#C8EDE7;border-radius:12px 12px 2px 12px;padding:9px 12px;max-width:70%;margin-left:auto;font-size:13px;line-height:1.45;color:var(--sb);}
.wa-in{background:#fff;border:1px solid var(--bd);border-radius:12px 12px 12px 2px;padding:9px 12px;max-width:70%;font-size:13px;line-height:1.45;}
.wa-meta{font-size:10px;color:var(--tm);margin-top:3px;text-align:right;}
.wa-meta-l{text-align:left;}
.wa-ai-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--gold-pale);color:var(--gold-d);padding:2px 7px;border-radius:10px;font-weight:700;margin-bottom:4px;}
.wa-input-row{padding:11px 15px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.wa-input{flex:1;border:1.5px solid var(--bd);border-radius:20px;padding:8px 14px;font-size:13px;font-family:var(--font);color:var(--tp);background:var(--cr);outline:none;transition:border-color .15s;}
.wa-input:focus{border-color:var(--teal);}
/* ─── SETTINGS ─── */
.stg-layout{display:grid;grid-template-columns:210px 1fr;gap:18px;}
.stg-nav{background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:8px;height:fit-content;box-shadow:var(--shadow);}
.stg-nav-it{padding:9px 12px;border-radius:7px;font-size:13px;color:var(--ts);cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:9px;font-weight:500;transition:all .12s;}
.stg-nav-it:hover{background:var(--cr);}
.stg-nav-it.active{background:var(--teal-pale);color:var(--teal-d);}
.stg-sec-ttl{font-size:13.5px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.stg-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);}
.stg-row:last-child{border-bottom:none;}
.stg-lbl{font-size:13.5px;font-weight:600;}
.stg-sub{font-size:12px;color:var(--tm);margin-top:2px;}
/* ─── TOGGLE ─── */
.tog{width:40px;height:23px;border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.tog.on{background:var(--teal);}
.tog.off{background:var(--bds);}
.tog-k{width:17px;height:17px;background:#fff;border-radius:50%;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on .tog-k{left:20px;}
.tog.off .tog-k{left:3px;}
/* ─── MODAL ─── */
.ov{position:fixed;inset:0;background:rgba(13,31,28,.55);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px);}
.modal{background:var(--su);border-radius:14px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--bd);}
.modal-wide{width:700px;}
.modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--su);z-index:1;}
.modal-ttl{font-size:16px;font-weight:800;color:var(--tp);}
.modal-cls{background:none;border:none;cursor:pointer;font-size:20px;color:var(--tm);padding:2px 6px;border-radius:5px;line-height:1;transition:all .12s;font-family:var(--font);}
.modal-cls:hover{color:var(--tp);background:var(--cr);}
.modal-bd{padding:22px 24px;}
.modal-ft{padding:14px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--su);}
/* ─── FORM ─── */
.fg{margin-bottom:16px;}
.fl{display:block;font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase;}
.fi2{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:9px 13px;font-size:13.5px;font-family:var(--font);color:var(--tp);background:var(--su);outline:none;transition:border-color .15s;}
.fi2:focus{border-color:var(--teal);}
.fi2.err{border-color:var(--red);}
.fi2-sel{appearance:none;cursor:pointer;}
.fe{font-size:11px;color:var(--red);margin-top:4px;font-weight:500;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
/* ─── BACK BTN ─── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ts);cursor:pointer;padding:5px 0;margin-bottom:16px;font-weight:600;transition:color .12s;user-select:none;}
.back-btn:hover{color:var(--teal-d);}
/* ─── INFO GRID ─── */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.info-item{background:var(--cr);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;}
.info-lbl{font-size:11px;color:var(--tm);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.info-val{font-size:14px;font-weight:700;color:var(--tp);}
/* ─── TIMELINE ─── */
.tl{position:relative;padding-left:22px;}
.tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:1.5px;background:var(--bd);}
.tl-it{position:relative;padding-bottom:14px;}
.tl-it:last-child{padding-bottom:0;}
.tl-it::before{content:'';position:absolute;left:-19px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid var(--su);box-shadow:0 0 0 1.5px var(--teal);}
.tl-it.sys::before{background:var(--tm);box-shadow:0 0 0 1.5px var(--tm);}
.tl-act{font-size:13px;color:var(--tp);line-height:1.45;font-weight:500;}
.tl-time{font-size:11px;color:var(--tm);margin-top:2px;}
/* ─── VENDOR ─── */
.vc-card{background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:18px;cursor:pointer;transition:border-color .15s;}
.vc-card:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(43,184,163,.08);}
.v-trade{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--teal-pale);color:var(--teal-dk);}
/* ─── BROADCAST ─── */
.bc-tmpl{border:1.5px solid var(--bd);border-radius:var(--r);padding:13px 14px;cursor:pointer;transition:all .12s;margin-bottom:9px;}
.bc-tmpl:hover{border-color:var(--teal);background:var(--teal-pale);}
.bc-tmpl.sel{border-color:var(--teal-d);background:var(--teal-pale);}
/* ─── REPORT CARD ─── */
.rc-card{background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:17px 19px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:border-color .12s;}
.rc-card:hover{border-color:var(--bds);}
/* ─── STAFF ─── */
.st-card{background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:17px;display:flex;align-items:center;gap:14px;transition:border-color .12s;}
.st-card:hover{border-color:var(--bds);}
/* ─── AI BANNER ─── */
.ai-banner{background:linear-gradient(135deg,var(--sb) 0%,var(--teal-dk) 60%,var(--teal-d) 100%);border-radius:var(--r);padding:20px 24px;margin-bottom:18px;display:flex;align-items:center;gap:16px;}
/* ─── EMPTY STATE ─── */
.empty{padding:48px 20px;text-align:center;}
.empty-ico{font-size:36px;margin-bottom:10px;}
.empty-ttl{font-size:14px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.empty-sub{font-size:12.5px;color:var(--tm);}
/* ─── NOTIFY TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sb);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:2000;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;animation:slideUp .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
.page{animation:fadeIn .18s ease;}
.modal{animation:modalIn .15s ease;}
</style>

const AddPropertyModal = ({onClose, onAdd}) => {
  const [f,setF] = useState({name:'',location:'',type:'Residential',units:'',manager:'',revenue:''});
  const [err,setErr] = useState({});
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const validate = () => {
    const e = {};
    if (!f.name.trim()) e.name='Property name is required';
    if (!f.location.trim()) e.location='Location is required';
    if (!f.units||isNaN(f.units)||parseInt(f.units)<1) e.units='Enter a valid number of units';
    return e;
  };
  const submit = () => {
    const e = validate();
    if (Object.keys(e).length){setErr(e);return;}
    onAdd({
      id:'P-'+String(Date.now()).slice(-4),
      name:f.name.trim(), location:f.location.trim(), type:f.type,
      units:parseInt(f.units), occupied:0,
      manager:f.manager.trim()||'Unassigned',
      revenue:f.revenue?'₦'+Number(f.revenue.replace(/,/g,'')).toLocaleString():'₦0',
      complaints:0, color:'#2BB8A3',
    });
    onClose();
  };
  return (
    <Modal title="Add New Property" onClose={onClose} footer={
      <><button className="btn b-out" onClick={onClose}>Cancel</button><button className="btn b-pri" onClick={submit}>Add Property</button></>
    }>
      <div className="fr2">
        <FG label="Property Name *" error={err.name}><FI placeholder="e.g. Palm Court Estate" value={f.name} onChange={e=>set('name',e.target.value)} error={err.name}/></FG>
        <FG label="Property Type"><FSel value={f.type} onChange={e=>set('type',e.target.value)}><option>Residential</option><option>Mixed-Use</option><option>Commercial</option></FSel></FG>
      </div>
      <FG label="Location / Address *" error={err.location}><FI placeholder="e.g. Lekki Phase 2, Lagos" value={f.location} onChange={e=>set('location',e.target.value)} error={err.location}/></FG>
      <div className="fr2">
        <FG label="Number of Units *" error={err.units}><FI type="number" min="1" placeholder="e.g. 24" value={f.units} onChange={e=>set('units',e.target.value)} error={err.units}/></FG>
        <FG label="Assigned Manager"><FI placeholder="e.g. Emeka" value={f.manager} onChange={e=>set('manager',e.target.value)}/></FG>
      </div>
      <FG label="Expected Monthly Revenue (₦)"><FI placeholder="e.g. 3,500,000" value={f.revenue} onChange={e=>set('revenue',e.target.value)}/></FG>
    </Modal>
  );
};

      since:new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'}), complaints:0,
    });

  };

    <Modal title="Add New Tenant" onClose={onClose} footer={
      <><button className="btn b-out" onClick={onClose}>Cancel</button><button className="btn b-pri" onClick={submit}>Add Tenant</button></>
    }>
      <div className="fr2">
        <FG label="Full Name *" error={err.name}><FI placeholder="e.g. Chidi Okonkwo" value={f.name} onChange={e=>set('name',e.target.value)} error={err.name}/></FG>
        <FG label="Phone *" error={err.phone}><FI placeholder="+234 8xx xxx xxxx" value={f.phone} onChange={e=>set('phone',e.target.value)} error={err.phone}/></FG>

const AddComplaintModal = ({onClose,onAdd,tenants,props}) => {
  const [f,setF] = useState({tenantId:tenants[0]?.id||'',type:'Plumbing',priority:'medium',desc:''});
  const [err,setErr] = useState({});
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const submit = () => {
    if (!f.desc.trim()){setErr({desc:'Please describe the issue'});return;}
    const t = tenants.find(x=>x.id===f.tenantId);
    const prop = props.find(p=>p.id===t?.propId);
    onAdd({
      id:'CMP-'+String(Date.now()).slice(-4),
      tenantId:f.tenantId, tenantName:t?.name||'',
      unit:t?.unit||'', propId:t?.propId||'', propName:prop?.name||'',
      type:f.type, priority:f.priority, status:'open',
      date:fmtNow(), age:'0d', desc:f.desc.trim(),
      vendorId:null, vendorName:null,
      timeline:[{time:fmtTime(),action:'Complaint logged manually',sys:false}],
    });
    onClose();
  };
  return (
    <Modal title="Log New Complaint" onClose={onClose} footer={
      <><button className="btn b-out" onClick={onClose}>Cancel</button><button className="btn b-pri" onClick={submit}>Log Complaint</button></>
    }>
      <div className="fr2">
        <FG label="Tenant"><FSel value={f.tenantId} onChange={e=>set('tenantId',e.target.value)}>{tenants.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</FSel></FG>
        <FG label="Issue Type"><FSel value={f.type} onChange={e=>set('type',e.target.value)}><option>Plumbing</option><option>Electrical</option><option>AC Fault</option><option>Pest Control</option><option>Security Door</option><option>Painting</option><option>Carpentry</option><option>Other</option></FSel></FG>
      </div>
      <FG label="Priority"><FSel value={f.priority} onChange={e=>set('priority',e.target.value)}><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="critical">Critical</option></FSel></FG>
      <FG label="Description *" error={err.desc}><FTA error={err.desc} rows={4} placeholder="Describe the issue in detail..." value={f.desc} onChange={e=>set('desc',e.target.value)} style={{resize:'vertical'}}/></FG>
    </Modal>
  );
};

const AddVendorModal = ({onClose,onAdd,props}) => {
  const [f,setF] = useState({name:'',trade:'Plumber',phone:'',email:'',notes:'',propIds:[]});
  const [err,setErr] = useState({});
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const toggleProp = id => setF(p=>({...p,propIds:p.propIds.includes(id)?p.propIds.filter(x=>x!==id):[...p.propIds,id]}));
  const submit = () => {
    const e = {};
    if (!f.name.trim()) e.name='Required';
    if (!f.phone.trim()) e.phone='Required';
    if (Object.keys(e).length){setErr(e);return;}
    onAdd({
      id:'V-'+String(Date.now()).slice(-4),
      name:f.name.trim(), trade:f.trade, phone:f.phone.trim(),
      email:f.email.trim(), notes:f.notes.trim(),
      propIds:f.propIds, status:'available', jobsDone:0, rating:4.0,
    });
    onClose();
  };
  return (
    <Modal title="Add New Vendor" onClose={onClose} footer={
      <><button className="btn b-out" onClick={onClose}>Cancel</button><button className="btn b-pri" onClick={submit}>Add Vendor</button></>
    }>
      <div className="fr2">
        <FG label="Name / Company *" error={err.name}><FI placeholder="e.g. Lagos Plumbing Co." value={f.name} onChange={e=>set('name',e.target.value)} error={err.name}/></FG>

      </div>
      <div className="fr2">
        <FG label="Phone *" error={err.phone}><FI placeholder="+234 8xx xxx xxxx" value={f.phone} onChange={e=>set('phone',e.target.value)} error={err.phone}/></FG>
        <FG label="Email"><FI type="email" placeholder="vendor@example.com" value={f.email} onChange={e=>set('email',e.target.value)}/></FG>
      </div>
      <FG label="Notes"><FTA rows={2} placeholder="Specialty, availability, certifications..." value={f.notes} onChange={e=>set('notes',e.target.value)} style={{resize:'vertical'}}/></FG>
      <FG label="Assigned Properties">

          <label key={p.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,cursor:'pointer',fontSize:13}}>
            <div style={{width:18,height:18,borderRadius:4,border:'2px solid '+(f.propIds.includes(p.id)?'var(--teal-d)':'var(--bds)'),background:f.propIds.includes(p.id)?'var(--teal-d)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .12s',cursor:'pointer'}} onClick={()=>toggleProp(p.id)}>

          ['✅','Completed Jobs',vendors.reduce((s,v)=>s+v.jobsDone,0),'var(--gn)'],
          ['⭐','Avg Rating',(vendors.reduce((s,v)=>s+v.rating,0)/vendors.length).toFixed(1),'var(--gold-d)']
        ].map(([ic,l,v,c])=>(
          <div className="mc" key={l} style={{cursor:'default'}}>
            <div className="mc-ico" style={{background:'var(--teal-pale)',fontSize:16}}>{ic}</div>
            <div className="ml">{l}</div>

      </div>
      <div className="fr-row">
        <div className="fi-wrap"><span style={{color:'var(--tm)'}}>🔍</span><input placeholder="Search vendors or trade..." value={search} onChange={e=>setSearch(e.target.value)}/></div>

      </div>
      {filtered.length===0?<EmptyState icon="🔧" title="No vendors found" desc="Add a vendor or adjust your filters" action={<button className="btn b-pri b-sm" onClick={()=>openModal('addVendor')}>+ Add Vendor</button>}/>:
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:13}}>

          const jobs = complaints.filter(c=>c.vendorId===v.id);

          return (
            <div className="vc-card" key={v.id} onClick={()=>setSubView({type:'vendor',id:v.id})}>

      </div>}
    </div>
  );
};

const PgInbox = ({threads, setThreads, initialSel=0}) => {
  const [sel,setSel] = useState(initialSel);
  const [msg,setMsg] = useState('');
  const msgEnd = useRef(null);
  const thread = threads[sel];
  useEffect(()=>{msgEnd.current?.scrollIntoView({behavior:'smooth'});},[sel,threads]);
  const send = () => {
    if (!msg.trim()) return;
    setThreads(ts=>ts.map((t,i)=>i===sel?{...t,msgs:[...t.msgs,{out:true,ai:false,text:msg,time:fmtTime()}],preview:msg,unread:0}:t));
    setMsg('');
  };
  return (
    <div className="page" style={{height:'calc(100vh - 56px - 44px - 48px)'}}>
      <div className="sc-hd" style={{marginBottom:12}}>
        <div><div className="sc-ttl">WhatsApp Inbox</div><div className="sc-sb">AI-managed tenant conversations</div></div>
        <span style={{display:'flex',alignItems:'center',gap:6,fontSize:12.5,background:'var(--teal-pale)',color:'var(--teal-d)',padding:'5px 12px',borderRadius:20,fontWeight:700}}>● AI Agent Active</span>
      </div>
      <div className="wa-layout" style={{height:'calc(100% - 60px)'}}>
        <div className="wa-list">
          <div className="wa-list-hd">Conversations</div>
          {threads.map((t,i)=>(
            <div key={t.id} className={'wa-thread '+(sel===i?'sel':'')} onClick={()=>{setSel(i);setThreads(ts=>ts.map((x,j)=>j===i?{...x,unread:0}:x));}}>
              <Av name={t.name} size={36}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div className="wa-thread-name">{t.name}</div>
                  <div style={{fontSize:10.5,color:'var(--tm)',flexShrink:0}}>{t.time}</div>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div className="wa-thread-preview">{t.preview}</div>
                  {t.unread>0&&<span className="wa-unread">{t.unread}</span>}
                </div>
                <div style={{fontSize:10.5,color:'var(--tm)',marginTop:2}}>Unit {t.unit}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="wa-chat">
          <div className="wa-chat-hd">
            <Av name={thread.name} size={36}/>
            <div><div style={{fontWeight:700,fontSize:14}}>{thread.name}</div><div style={{fontSize:12,color:'var(--teal)',fontWeight:600}}>● Online · Unit {thread.unit}</div></div>
            <div style={{marginLeft:'auto',display:'flex',gap:8}}>
              <button className="btn b-out b-sm" onClick={()=>showToast('Opening tenant profile')}>👤 Profile</button>
              <button className="btn b-pri b-sm" onClick={()=>showToast('Takeover mode enabled — AI responses paused for this conversation')}>Takeover</button>
            </div>
          </div>
          <div className="wa-messages">
            {thread.msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.out?'flex-end':'flex-start'}}>
                {m.ai&&<div className="wa-ai-tag">✦ AI Agent</div>}
                <div className={m.out?'wa-out':'wa-in'}>{m.text}</div>
                <div className={'wa-meta '+(m.out?'':'wa-meta-l')}>{m.time}</div>
              </div>
            ))}
            <div ref={msgEnd}/>
          </div>
          <div className="wa-input-row">
            <input className="wa-input" placeholder="Type a message..." value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>

        </div>
      </div>
    </div>
  );

                  <div><div style={{fontSize:16,fontWeight:800,color:'#fff'}}>Growth Plan</div><div style={{fontSize:12.5,color:'rgba(255,255,255,.7)',marginTop:4}}>Up to 100 units · Unlimited AI messages · Priority support</div></div>
                  <div style={{marginLeft:'auto',textAlign:'right'}}><div style={{fontSize:24,fontWeight:800,color:'#fff'}}>₦45,000</div><div style={{fontSize:11.5,color:'rgba(255,255,255,.6)'}}>per month</div></div>
                </div>
                {[['Units used','72 / 100'],['Billing cycle','Monthly · Renews Apr 1, 2025'],['Payment method','Mastercard ending 4242'],['Next invoice','₦45,000 on Apr 1, 2025']].map(([l,v])=>(
                  <div className="stg-row" key={l}><div className="stg-lbl">{l}</div><div style={{fontSize:13.5,color:'var(--ts)',fontWeight:600}}>{v}</div></div>
                ))}
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn b-out" onClick={()=>showToast('Loading invoice history...')}>View Invoice History</button>
                <button className="btn b-pri" onClick={()=>showToast('Upgrade flow — feature in beta')}>Upgrade Plan</button>
              </div>
            </div>
          )}
          {tab==='sec'&&(
            <div>
              <div style={{marginBottom:22}}>
                <div className="stg-sec-ttl">Account Security</div>
                {[['Two-factor authentication','Require 2FA for all team logins',true],['Session timeout','Log out after 8 hours of inactivity',true],['Login notifications','Email on new device sign-in',false]].map(([l,sub,init])=>{
                  const [v,setV] = useState(init);
                  return <div className="stg-row" key={l}><div><div className="stg-lbl">{l}</div><div className="stg-sub">{sub}</div></div><Tog on={v} onChange={setV}/></div>;
                })}
              </div>
              <div>
                <div className="stg-sec-ttl">Change Password</div>
                <div style={{display:'flex',flexDirection:'column',gap:12,maxWidth:360}}>
                  <FG label="Current Password"><input type="password" className="fi2" placeholder="••••••••" value={pass.cur} onChange={e=>setPass(p=>({...p,cur:e.target.value}))}/></FG>
                  <FG label="New Password"><input type="password" className="fi2" placeholder="••••••••" value={pass.nw} onChange={e=>setPass(p=>({...p,nw:e.target.value}))}/></FG>
                  <FG label="Confirm New Password"><input type="password" className="fi2" placeholder="••••••••" value={pass.conf} onChange={e=>setPass(p=>({...p,conf:e.target.value}))}/></FG>
                  <button className="btn b-pri" style={{alignSelf:'flex-start'}} onClick={doPassUpdate}>Update Password</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ROOT APP
// ═══════════════════════════════════════════════
function App() {
  const [page, setPage] = useState('dashboard');
  const [subView, setSubView] = useState(null);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [props, setProps] = useState(SEED_PROPS);
  const [tenants, setTenants] = useState(SEED_TENANTS);
  const [complaints, setComplaints] = useState(SEED_COMPLAINTS);
  const [vendors, setVendors] = useState(SEED_VENDORS);
  const [threads, setThreads] = useState(WA_THREADS);
  const [inboxSel, setInboxSel] = useState(0);

  const showToast = msg => { setToast(msg); };
  const nav = pg => { setPage(pg); setSubView(null); };
  const openModal = type => setModal(type);
  const closeModal = () => setModal(null);

  // Cross-page navigation to detail views
  const crossNav = (pg, id) => { setPage(pg); setSubView({type:pg==='complaints'?'complaint':pg==='tenants'?'tenant':pg==='vendors'?'vendor':'property', id}); };
  const viewDetail = (type, id) => { const pageMap = {complaint:'complaints',tenant:'tenants',property:'properties',vendor:'vendors'}; crossNav(pageMap[type]||type, id); };

  // State mutations
  const addProp = p => { setProps(ps=>[...ps,p]); showToast('Property "'+p.name+'" added successfully'); };
  const addTenant = t => { setTenants(ts=>[...ts,t]); showToast('Tenant "'+t.name+'" added successfully'); };
  const addComplaint = c => { setComplaints(cs=>[...cs,c]); showToast('Complaint '+c.id+' logged'); };
  const addVendor = v => { setVendors(vs=>[...vs,v]); showToast('Vendor "'+v.name+'" added'); };

  const updateStatus = (id, status) => {
    const label = {open:'Open','in-progress':'In Progress',done:'Resolved'}[status]||status;
    setComplaints(cs=>cs.map(c=>c.id===id?{...c,status,timeline:[...(c.timeline||[]),{time:fmtTime(),action:'Status changed to "'+label+'"',sys:false}]}:c));
    showToast('Complaint '+id+' → '+label);
  };

  const assignVendor = (cId, vId) => {
    const v = vendors.find(x=>x.id===vId);
    setComplaints(cs=>cs.map(c=>c.id===cId?{...c,vendorId:vId,vendorName:v?.name,status:c.status==='open'?'in-progress':c.status,timeline:[...(c.timeline||[]),{time:fmtTime(),action:(v?.name||'Vendor')+' assigned to this complaint',sys:false}]}:c));
    setVendors(vs=>vs.map(v2=>v2.id===vId?{...v2,status:'busy'}:v2));
    showToast((v?.name||'Vendor')+' assigned to '+cId);
  };

  const openCount = complaints.filter(c=>c.status!=='done').length;

  const renderPage = () => {
    const common = {props,tenants,complaints,vendors,subView,setSubView,openModal,crossNav,nav,viewDetail,showToast};
    switch(page) {
      case 'dashboard': return <PgDash {...common} openModal={openModal}/>;
      case 'properties': return <PgProperties {...common}/>;
      case 'tenants': return <PgTenants {...common} navToInbox={(tenantId)=>{const idx=threads.findIndex(t=>t.tenantId===tenantId);setInboxSel(idx>=0?idx:0);nav('inbox');}}/>;
      case 'complaints': return <PgComplaints {...common} updateStatus={updateStatus} assignVendor={assignVendor}/>;
      case 'vendors': return <PgVendors {...common}/>;
      case 'payments': return <PgPayments props={props} openModal={openModal} showToast={showToast}/>;
      case 'invoices': return <PgInvoices showToast={showToast}/>;
      case 'inbox': return <PgInbox threads={threads} setThreads={setThreads} initialSel={inboxSel}/>;
      case 'broadcast': return <PgBroadcast/>;
      case 'insights': return <PgInsights complaints={complaints} tenants={tenants} props={props}/>;
      case 'reports': return <PgReports showToast={showToast}/>;
      case 'staff': return <PgStaff showToast={showToast}/>;
      case 'settings': return <PgSettings showToast={showToast}/>;
      default: return <PgDash {...common} openModal={openModal}/>;
    }
  };

            <div className="tb-acts">
              <div className="ib" onClick={()=>showToast('3 new notifications')}>🔔<div className="nd"/></div>
              <div className="ib" onClick={()=>nav('inbox')}>💬</div>
              <div className="tb-av" onClick={()=>nav('settings')}>EO</div>
            </div>
          </div>
          <div className="content" key={page+JSON.stringify(subView)}>
            {renderPage()}
          </div>
        </div>
      </div>

      {/* MODALS */}
      {modal==='addProp'&&<AddPropertyModal onClose={closeModal} onAdd={addProp}/>}
      {modal==='addTenant'&&<AddTenantModal onClose={closeModal} onAdd={addTenant} props={props}/>}
      {modal==='addComplaint'&&<AddComplaintModal onClose={closeModal} onAdd={addComplaint} tenants={tenants} props={props}/>}
      {modal==='addVendor'&&<AddVendorModal onClose={closeModal} onAdd={addVendor} props={props}/>}

      {/* TOAST */}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
